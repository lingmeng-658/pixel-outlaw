name: One-off title start hotfix

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply minimal source fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          main_path = Path('src/main.ts')
          main = main_path.read_text(encoding='utf-8')

          old_create_branch = """    if (startData.mode === 'newRun') {
              this.startGame()
            } else if (startData.mode === 'restartLevel') {
              this.startGame()
              this.restoreLevelCheckpoint(startData.checkpoint)
            }
          """
          new_create_branch = """    if (startData.mode === 'restartLevel') {
              this.startGame()
              this.restoreLevelCheckpoint(startData.checkpoint)
            }
          """

          old_start_new_run = """  private startNewRun() {
              if (this.isStarted) return
              this.scene.restart({ mode: 'newRun', autoStart: true } satisfies SceneStartData)
            }
          """
          new_start_new_run = """  private startNewRun() {
              if (this.isStarted) return
              this.startGame()
            }
          """

          if main.count(old_create_branch) != 1:
              raise SystemExit('Expected create() newRun branch exactly once')
          if main.count(old_start_new_run) != 1:
              raise SystemExit('Expected startNewRun() implementation exactly once')

          main = main.replace(old_create_branch, new_create_branch)
          main = main.replace(old_start_new_run, new_start_new_run)
          main_path.write_text(main, encoding='utf-8')

          lifecycle_path = Path('src/levelLifecycle.ts')
          lifecycle = lifecycle_path.read_text(encoding='utf-8')
          old_union_member = "  | { mode: 'newRun'; autoStart: true }\n"
          if lifecycle.count(old_union_member) != 1:
              raise SystemExit('Expected SceneStartData newRun member exactly once')
          lifecycle = lifecycle.replace(old_union_member, '')
          lifecycle_path.write_text(lifecycle, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit verified fix
        shell: bash
        run: |
          rm .github/workflows/title-start-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.ts src/levelLifecycle.ts .github/workflows/title-start-hotfix.yml
          git diff --cached --check
          git commit -m "fix: 修复标题页新游戏启动"
          git push origin main
